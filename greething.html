<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Greeting UI</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #74ebd5, #9face6);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input {
      width: 90%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border: none;
      background: #6c63ff;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .greet {
      margin-top: 20px;
      font-size: 22px;
      opacity: 0;
      transform: translateY(20px);
      transition: 0.5s ease;
    }

    .greet.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

<div class="card">
  <h2>👋 Welcome</h2>

  <input type="text" id="nameInput" placeholder="Enter your name">

  <button onclick="showGreeting()">Submit</button>

  <div id="greet" class="greet"></div>
</div>

<script>
  const input = document.getElementById("nameInput");
  const greetBox = document.getElementById("greet");

  // Enter key support
  input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      showGreeting();
    }
  });

  function showGreeting() {
    const name = input.value.trim();

    if (name === "") {
      alert("Please enter your name");
      return;
    }

    greetBox.textContent = `Hello, ${name} 👋 Welcome!`;
    greetBox.classList.remove("show");

    // restart animation
    void greetBox.offsetWidth;

    greetBox.classList.add("show");
    input="";
  }
</script>

</body>
</html>
